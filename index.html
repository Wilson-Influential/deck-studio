<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Ccircle%20cx='50'%20cy='50'%20r='38.16'%20fill='none'%20stroke='%23fe2458'%20stroke-width='19.68'/%3E%3C/svg%3E">
<title>Deck Studio · Influential</title>
<style>
  :root{
    --navy:#201747; --white:#fff; --charcoal:#5f616d;
    --red:#fe2458; --cream:#fbf7ef;
    --bg:#f4f2f8; --card:#fff; --line:#e7e4f0; --soft:#f0eef7;
    --font:'Effra Trial','Effra',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--navy);font-family:var(--font);-webkit-font-smoothing:antialiased}

  /* top bar */
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .topbar .logo{height:30px;width:auto;display:block}
  .topbar h1{font-size:21px;font-weight:900;letter-spacing:-.6px;margin:0}
  .topbar .sep{width:1px;height:22px;background:var(--line)}
  .topbar .deckName{font-size:14.5px;color:#201747;font-weight:800;letter-spacing:-.2px;border:0;background:transparent;padding:5px 10px;border-radius:7px;min-width:150px;max-width:340px;outline:none;transition:background .12s}
  .topbar .deckName::placeholder{color:var(--charcoal);font-weight:700;opacity:.55}
  .topbar .deckName:hover{background:#f3f2f7}
  .topbar .deckName:focus{background:#eceaf4}
  .topbar .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:#fff;color:var(--navy);
    border-radius:999px;padding:9px 15px;font:inherit;font-size:13px;font-weight:900;cursor:pointer;transition:.14s;white-space:nowrap}
  .btn:hover{background:var(--soft)}
  .btn svg{width:15px;height:15px}
  .btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn.primary:hover{background:#150f30}
  .exportWrap{position:relative}
  .exportMenu{position:absolute;right:0;top:calc(100% + 8px);min-width:230px;background:#fff;border:1px solid var(--line);border-radius:12px;
    box-shadow:0 18px 42px -24px rgba(32,23,71,.9);padding:6px;display:none;z-index:40}
  .exportWrap.open .exportMenu{display:block}
  .exportMenu button{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--navy);border-radius:8px;
    padding:10px 11px;font:inherit;font-size:13px;font-weight:900;text-align:left;cursor:pointer}
  .exportMenu button:hover{background:var(--soft)}
  .exportMenu svg{width:15px;height:15px;flex:0 0 auto}
  .exportMenu .sub{display:block;color:var(--charcoal);font-size:11px;font-weight:700;margin-top:2px}
  .exportDivider{height:1px;background:var(--line);margin:5px 4px}

  /* layout */
  .app{display:grid;grid-template-columns:212px 1fr 320px;gap:0;height:calc(100vh - 60px)}
  @media (max-width:1080px){ .app{grid-template-columns:1fr;height:auto} }

  /* rail */
  .rail{border-right:1px solid var(--line);background:#faf9fd;overflow-y:auto;padding:14px 12px}
  .rail .add{width:100%;justify-content:center;margin-bottom:14px;border-style:dashed}
  .slideItem{position:relative;border:2px solid transparent;border-radius:11px;overflow:hidden;margin-bottom:11px;cursor:pointer;background:#fff;box-shadow:0 6px 16px -12px rgba(32,23,71,.7);transition:.12s}
  .slideItem:hover{box-shadow:0 10px 22px -12px rgba(32,23,71,.8)}
  .slideItem.on{border-color:var(--red)}
  .slideItem .thumb{aspect-ratio:16/9;display:block;background:var(--navy)}
  .slideItem .thumb svg{display:block;width:100%;height:100%}
  .slideItem .meta{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;font-size:11px;font-weight:900;color:var(--charcoal)}
  .slideItem .meta .nm{text-transform:capitalize}
  .slideItem .ctrls{display:flex;gap:3px;opacity:0;transition:.12s}
  .slideItem:hover .ctrls,.slideItem.on .ctrls{opacity:1}
  .miniBtn{width:21px;height:21px;border:0;border-radius:6px;background:var(--soft);color:var(--navy);cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
  .miniBtn:hover{background:var(--red);color:#fff}
  .miniBtn svg{width:11px;height:11px}
  .slideItem .num{position:absolute;top:6px;left:6px;background:rgba(32,23,71,.82);color:#fff;font-size:10px;font-weight:900;border-radius:6px;padding:2px 6px}

  /* stage */
  .stage{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 20px;overflow:auto;background:
    radial-gradient(circle at 1px 1px, rgba(32,23,71,.05) 1px, transparent 0) 0 0/26px 26px}
  /* the preview fills the stage: grow to the column width, but never taller than the
     viewport allows for a 16:9 slide, so wide screens lose the dead side space */
  .stage .frame{width:100%;max-width:min(1180px, calc((100vh - 150px) * 16 / 9));border-radius:14px;overflow:hidden;box-shadow:0 40px 90px -50px rgba(32,23,71,.9)}
  .stage .frame.drop{box-shadow:0 0 0 4px var(--navy),0 40px 90px -50px rgba(32,23,71,.9)}
  .stage .frame svg{display:block;width:100%;height:auto}
  .stage .cap{margin-top:14px;font-size:13px;color:var(--charcoal);font-weight:700;display:flex;gap:14px;align-items:center}
  .stage .cap b{color:var(--navy)}
  .stage .cap .dlSlide{cursor:pointer;color:var(--navy);text-decoration:underline;text-underline-offset:3px}

  #preview [data-edit]{cursor:text}
  .editHL{position:fixed;pointer-events:none;border-radius:7px;opacity:0;transition:opacity .13s ease;z-index:60}
  .editHL.on{opacity:1}
  #preview [data-edit]{cursor:text}
  #preview [data-imgslot]{cursor:pointer}
  /* split handle: invisible at rest (matches export), faint glassy on slide-hover,
     full when you hover the handle itself or drag — so it's discoverable but never reads as chrome */
  #preview [data-split]{opacity:0;transition:opacity .16s ease}
  #preview:hover [data-split]{opacity:.4}
  #preview [data-split]:hover{opacity:1}
  .frame.splitting [data-split]{opacity:1}
  .editBox{position:fixed;box-sizing:border-box;z-index:70;margin:0;border:0;padding:0;background:transparent;resize:none;overflow:hidden;line-height:1.15;font-family:'Effra Trial','Effra',system-ui,'Segoe UI',sans-serif;outline:none;-webkit-font-smoothing:antialiased;animation:editIn .1s ease}
  @keyframes editIn{from{opacity:0}to{opacity:1}}
  .editLabel{position:fixed;z-index:71;transform:translateY(-100%) translateY(-7px);background:#201747;color:#fff;font:700 10.5px/1 system-ui,sans-serif;letter-spacing:.05em;text-transform:uppercase;padding:4px 7px;border-radius:5px;white-space:nowrap;pointer-events:none}
  .editTip{position:fixed;z-index:71;transform:translateY(-100%) translateY(-9px);background:#201747;color:#fff;font:700 10.5px/1.3 system-ui,sans-serif;letter-spacing:.03em;padding:5px 9px;border-radius:6px;white-space:nowrap;text-align:center;pointer-events:none;box-shadow:0 8px 20px -8px rgba(0,0,0,.55);opacity:0;transition:opacity .14s ease}
  .editTip.on{opacity:1}
  .editToast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#201747;color:#fff;font:700 12px/1 system-ui,sans-serif;padding:9px 14px;border-radius:8px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none}
  .editToast.on{opacity:1}

  /* editor */
  .editor{border-left:1px solid var(--line);background:#fff;overflow-y:auto;padding:20px}
  .editor h2{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--charcoal);margin:0 0 12px;font-weight:900}
  .editor h2:not(:first-child){margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
  .layoutGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
  .layoutGrid button{border:1.5px solid var(--line);background:var(--soft);color:var(--charcoal);border-radius:10px;padding:9px 8px;font:inherit;font-size:12px;font-weight:900;cursor:pointer;transition:.12s}
  .layoutGrid button:hover{border-color:#cfc9e0}
  .layoutGrid button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:900;margin-bottom:5px}
  .field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:9px 11px;font:inherit;font-size:13.5px;color:var(--navy);background:var(--soft);resize:vertical;transition:.14s}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--navy);background:#fff;box-shadow:0 0 0 4px rgba(32,23,71,.07)}
  .field .hint{font-size:11px;color:#a7a2b8;margin-top:4px;font-weight:600;line-height:1.4}
  .sectors{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .sw{aspect-ratio:1;border-radius:11px;border:3px solid transparent;cursor:pointer;transition:.12s;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .sw:hover{transform:translateY(-2px)}
  .sw.on{border-color:var(--navy)}

  /* image field (editor) */
  .imgField{border:1.5px solid var(--line);border-radius:12px;padding:10px;background:var(--soft)}
  .imgThumb{width:100%;aspect-ratio:16/9;border-radius:8px;background-color:#fff;background-size:contain;background-position:center;background-repeat:no-repeat;border:1px solid var(--line);margin-bottom:9px}
  .imgEmpty{width:100%;aspect-ratio:16/9;border-radius:8px;border:1.5px dashed #cfc9e0;display:flex;align-items:center;justify-content:center;color:#a7a2b8;font-size:12px;font-weight:800;margin-bottom:9px}
  .imgBtns{display:flex;gap:6px}
  .imgBtn{flex:1;border:1.5px solid var(--line);background:#fff;color:var(--navy);border-radius:8px;padding:7px 6px;font:inherit;font-size:12px;font-weight:900;cursor:pointer;transition:.12s}
  .imgBtn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
  .imgBtn.ghost{flex:0 0 auto;color:var(--charcoal)}
  .imgBtn.ghost:hover{background:var(--red);border-color:var(--red);color:#fff}
  .imgField.drop{border-color:var(--navy);background:#fff;box-shadow:0 0 0 4px rgba(32,23,71,.10)}
  .imgField.drop *{pointer-events:none}

  /* library panel (non-modal side panel) */
  .libPanel{position:fixed;top:60px;right:0;width:400px;max-width:94vw;height:calc(100vh - 60px);background:#fff;border-left:1px solid var(--line);
    box-shadow:-26px 0 64px -42px rgba(32,23,71,.85);transform:translateX(102%);transition:transform .22s cubic-bezier(.4,0,.2,1);z-index:50;display:flex;flex-direction:column}
  .libPanel.on{transform:none}
  .libHead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .libHead h3{margin:0;font-size:15px;font-weight:900;letter-spacing:-.3px}
  .libHead .sub{display:block;font-size:11px;font-weight:700;color:var(--charcoal);margin-top:2px}
  .libX{width:30px;height:30px;border:0;border-radius:8px;background:var(--soft);color:var(--navy);font-size:16px;cursor:pointer;line-height:1}
  .libX:hover{background:var(--red);color:#fff}
  .libTabs{display:flex;gap:6px;padding:12px 16px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  .libTab{border:1.5px solid var(--line);background:var(--soft);border-radius:999px;padding:6px 12px;font:inherit;font-size:12px;font-weight:900;color:var(--charcoal);cursor:pointer;transition:.12s}
  .libTab:hover{border-color:#cfc9e0}
  .libTab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .libGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px;overflow-y:auto;align-content:start}
  .libItem{border:1.5px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;background:#fff;transition:.12s}
  .libItem:hover{border-color:var(--navy);transform:translateY(-2px);box-shadow:0 12px 24px -16px rgba(32,23,71,.7)}
  .libThumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#f4f2f8;padding:14px}
  .libThumb img{max-width:80%;max-height:80%;display:block}
  .libItem .nm{font-size:11px;font-weight:800;padding:7px 9px;color:var(--charcoal);border-top:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .libEmpty{grid-column:1/-1;padding:34px 20px;text-align:center;color:var(--charcoal);font-size:13px;font-weight:700;line-height:1.5}
  .libUpload{margin:0 16px 16px;border:1.5px dashed #cfc9e0;border-radius:10px;padding:12px;text-align:center;color:var(--charcoal);font-size:12px;font-weight:800;cursor:pointer}
  .libUpload:hover{border-color:var(--navy);color:var(--navy)}

  /* drag-to-reorder slides */
  .slideItem{cursor:grab}
  .slideItem:active{cursor:grabbing}
  .slideItem .thumb{cursor:pointer}
  .slideItem.dragging{opacity:.35}
  .slideItem.dropBefore{box-shadow:0 -3px 0 0 var(--red),0 6px 16px -12px rgba(32,23,71,.7)}
  .slideItem.dropAfter{box-shadow:0 3px 0 0 var(--red),0 6px 16px -12px rgba(32,23,71,.7)}

  .printRoot{display:none}
  @media print{
    @page{ size:338mm 190mm; margin:0; }
    body{background:#fff}
    .topbar,.app{display:none !important}
    .printRoot{display:block}
    .pslide{width:100%;height:100vh;page-break-after:always;overflow:hidden}
    .pslide svg{display:block;width:100%;height:100%}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Deck Studio</h1>
  <span class="sep"></span>
  <input id="deckName" class="deckName" type="text" placeholder="Untitled deck" maxlength="80" spellcheck="false" aria-label="Deck name" title="Name this deck — used in downloads and share links">
  <span class="spacer"></span>
  <div class="exportWrap" id="exportWrap">
    <button class="btn primary" id="btnExport" aria-haspopup="true" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg>Export</button>
    <div class="exportMenu" id="exportMenu" role="menu">
      <button id="menuPDF" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4v-6h16v6h-2M8 22h8v-6H8z"/></svg><span>Deck as PDF<span class="sub">Print-ready 16:9 pages</span></span></button>
      <button id="menuPPTX" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 15h6"/><path d="M12 12v6"/></svg><span>Deck as PPTX<span class="sub">Editable PowerPoint file</span></span></button>
      <button id="menuPNG" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 5 5-5M5 21h14"/></svg><span>This slide as PNG<span class="sub">2560x1440 image</span></span></button>
      <div class="exportDivider"></div>
      <button id="menuLink" role="menuitem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1"/><path d="M14 11a5 5 0 0 0-7.1 0l-2 2a5 5 0 0 0 7.1 7.1l1.1-1.1"/></svg><span>Copy share link<span class="sub">Current deck state</span></span></button>
    </div>
  </div>
</div>

<div class="app">
  <aside class="rail" id="rail"></aside>
  <main class="stage">
    <div class="frame" id="preview"></div>
    <div class="cap" id="cap"></div>
  </main>
  <aside class="editor" id="editor"></aside>
</div>

<div class="printRoot" id="printRoot"></div>

<script src="vendor/pptxgen.bundle.js"></script>

/* ===== brand system (shared engine with Post Studio) ===== */
const BRAND = { navy:'#201747', white:'#ffffff', cream:'#fbf7ef', yellow:'#f1e63f' };
const LOGO_AR = 2.525;
const SECTORS = [
  {id:'insights', name:'Insights', accent:'#fe2458', deep:'#a91538'},
  {id:'digital',  name:'Digital',  accent:'#2af22f', deep:'#197319'},
  {id:'creative', name:'Creative', accent:'#f1e63f', deep:'#efa33f'},
  {id:'pr',       name:'PR',       accent:'#0b1ee4', deep:'#071289'},
  {id:'campaign', name:'Campaign', accent:'#ff7d3a', deep:'#a41f1f'},
];
const W=1280, H=720;

function lum(hex){const c=[1,3,5].map(i=>parseInt(hex.slice(i,i+2),16)/255).map(v=>v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4));return 0.2126*c[0]+0.7152*c[1]+0.0722*c[2];}
function mix(a,b,t){const n=h=>{h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return h;};const pa=[0,2,4].map(i=>parseInt(n(a).substr(i,2),16));const pb=[0,2,4].map(i=>parseInt(n(b).substr(i,2),16));return '#'+pa.map((v,i)=>Math.round(v+(pb[i]-v)*t).toString(16).padStart(2,'0')).join('');}
const inkOn=hex=>lum(hex)>0.42?BRAND.navy:'#ffffff';
const logoOn=hex=>lum(hex)>0.42?'nvy':'wht';
const esc=s=>(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

function wrapWords(text,maxChars){const words=(text||'').trim().split(/\s+/).filter(Boolean);if(!words.length)return[];const lines=[];let cur='';for(const w of words){if(!cur){cur=w;continue;}if((cur+' '+w).length<=maxChars)cur+=' '+w;else{lines.push(cur);cur=w;}}if(cur)lines.push(cur);return lines;}
function fitHead(text,w,h,max,min,charW=0.53,lh=1.0){for(let fs=max;fs>=min;fs-=Math.max(1,max*0.02)){const mc=Math.max(4,Math.floor(w/(fs*charW)));const lines=wrapWords(text,mc);const longest=lines.reduce((m,l)=>Math.max(m,l.length),0);if(longest<=mc+1&&lines.length*fs*lh<=h)return{fs,lines,lh};}const fs=min,mc=Math.max(4,Math.floor(w/(fs*charW)));return{fs,lines:wrapWords(text,mc),lh};}
function bodyLines(text,boxW,bFs,budgetH,lh=1.3){let bl=wrapWords(text,Math.max(6,Math.floor(boxW/(bFs*0.5))));const max=Math.max(1,Math.floor(budgetH/(bFs*lh)));if(bl.length>max){bl=bl.slice(0,max);bl[bl.length-1]=bl[bl.length-1].replace(/[.,;:]?$/,'…');}return bl;}
function tblock(lines,x,y,fs,lh,fill,weight,anchor='start',letter=-0.02,editKey,wrapW){if(!lines.length)return'';const de=editKey?` data-edit="${editKey}"${wrapW?` data-wrap="${(+wrapW).toFixed(0)}"`:''}`:'';let t=`<text${de} x="${x}" font-size="${fs.toFixed(1)}" fill="${fill}" font-weight="${weight}" text-anchor="${anchor}" letter-spacing="${(letter*fs).toFixed(2)}">`;lines.forEach((ln,i)=>{const ly=y+fs*0.8+i*fs*lh;t+=`<tspan x="${x}" y="${ly.toFixed(1)}">${esc(ln)}</tspan>`;});return t+'</text>';}
function kicker(text,x,y,fs,fill,anchor='start',editKey){if(!text)return'';const de=editKey?` data-edit="${editKey}"`:'';return `<text${de} x="${x}" y="${y.toFixed(1)}" font-size="${fs.toFixed(1)}" fill="${fill}" font-weight="800" text-anchor="${anchor}" letter-spacing="${(fs*0.16).toFixed(2)}">${esc(text.toUpperCase())}</text>`;}
// Brand rule: the wordmark lettering aligns to the copy edge; the ring (the "i"-dot) hangs into
// the margin. The wordmark occupies x-fraction 0.204 .. 0.892 of the logo's width.
const WM_LEFT=0.204, WM_RIGHT=0.892;
function logoTag(variant,x,y,w,anchor='start'){
  const h=w/LOGO_AR;
  const ix = anchor==='mid' ? x : anchor==='end' ? x+w*(1-WM_RIGHT) : x-w*WM_LEFT;
  return `<image href="${LOGOS[variant]}" x="${ix.toFixed(1)}" y="${y.toFixed(0)}" width="${w.toFixed(0)}" height="${h.toFixed(0)}" preserveAspectRatio="xMinYMid meet"/>`;}
function motif(uid,cx,cy,r,c1,c2,op=1){return `<defs><radialGradient id="m${uid}" cx="34%" cy="32%" r="80%"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></radialGradient></defs><circle cx="${cx.toFixed(0)}" cy="${cy.toFixed(0)}" r="${r.toFixed(0)}" fill="url(#m${uid})" opacity="${op}"/>`;}
// the brand ring (Influential "i"-dot / Secondary Icon): inner/outer diameter = 0.59
function ring(cx,cy,R,color,op=1){const rc=R*0.795,sw=R*0.41;return `<circle cx="${(+cx).toFixed(1)}" cy="${(+cy).toFixed(1)}" r="${rc.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${sw.toFixed(1)}" opacity="${op}"/>`;}
// per-slide brand mark: main logo (full lockup) | ring (the brand icon) | off
function brandMark(opt,x,y,w,variant,ringColor,anchor='start'){
  opt=opt||'main';
  if(opt==='off') return '';
  if(opt==='ring'){ const R=w*0.32, cx=x+R, cy=y+w/LOGO_AR/2, rr=R*0.795, hp=rr*1.6;
    const hot=`<rect x="${(cx-hp).toFixed(1)}" y="${(cy-hp).toFixed(1)}" width="${(2*hp).toFixed(1)}" height="${(2*hp).toFixed(1)}" fill="transparent"/>`;
    return `<g data-edit-logo="1" style="cursor:pointer">${hot}${ring(cx,cy,R,ringColor)}</g>`; }
  return `<g data-edit-logo="1" style="cursor:pointer">${logoTag(variant,x,y,w,anchor)}</g>`;
}

function footer(page,total,dark){const ink=dark?mix('#ffffff',BRAND.navy,0.5):mix(BRAND.navy,'#ffffff',0.45);const fs=H*0.022,m=W*0.06;return `<text x="${W-m}" y="${(H-H*0.045).toFixed(0)}" font-size="${fs}" fill="${ink}" font-weight="800" text-anchor="end" letter-spacing="1">${String(page).padStart(2,'0')} / ${String(total).padStart(2,'0')}</text>`;}

/* ===== image helpers (embedded base64 images, same export-safe path as the logo) ===== */
// Empty image slot — a neutral "add an image here" well. Light-grey fill (matches the
// unpressed editor buttons, --soft), a grey dashed frame, and the real Lucide
// `image-plus` icon. Reads as an empty placeholder you must fill, not a design choice.
const PH_FILL='#f0eef7', PH_LINE='#cdc7de', PH_INK='#8a86a0';   // --soft, mid-line, muted ink
// Image+text split: drag snaps to these designed ratios so every result looks intentional.
const SPLIT_STOPS=[1/3, 0.4, 0.5, 0.6, 2/3];
function snapSplit(frac){ return SPLIT_STOPS.reduce((b,s)=>Math.abs(s-frac)<Math.abs(b-frac)?s:b, SPLIT_STOPS[0]); }
// transparent hit layer over an image region — click an empty slot to upload, drop a file onto it.
// Rendered BELOW captions/handles so text-edit + handle clicks still win.
function imgSlotHit(key,x,y,w,h){ return `<rect data-imgslot="${esc(key)}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" fill="transparent"/>`; }
// skeleton bar (rounded grey lozenge) — used to sketch where text will sit in an empty slide
function skelBar(x,y,w,h){ return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="${(h/2).toFixed(1)}" fill="${PH_LINE}" fill-opacity="0.6" pointer-events="none"/>`; }
// Lucide image-plus (24×24, MIT) — the "+" corner signals "add"
const LUCIDE_IMAGE_PLUS='<path d="M16 5h6"/><path d="M19 2v6"/><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/><circle cx="9" cy="9" r="2"/>';
function imgPlaceholder(x,y,w,h,accent,prompt){
  const cx=x+w/2, cy=y+h/2, s=Math.min(w,h);
  // dashed drop frame, inset — neutral grey so it reads as "empty, add here"
  const inset=s*0.05;
  const frame=`<rect x="${(x+inset).toFixed(1)}" y="${(y+inset).toFixed(1)}" width="${(w-2*inset).toFixed(1)}" height="${(h-2*inset).toFixed(1)}" rx="${(s*0.025).toFixed(1)}" fill="none" stroke="${PH_LINE}" stroke-width="${Math.max(2,s*0.006).toFixed(1)}" stroke-dasharray="${(s*0.03).toFixed(1)} ${(s*0.022).toFixed(1)}"/>`;
  // Lucide icon, scaled into the box, centred a touch above the label
  const isz=s*0.2, sc=isz/24, ix=cx-isz/2, iy=cy-isz/2-h*0.05;
  const icon=`<g transform="translate(${ix.toFixed(1)},${iy.toFixed(1)}) scale(${sc.toFixed(3)})" fill="none" stroke="${PH_INK}" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">${LUCIDE_IMAGE_PLUS}</g>`;
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${PH_FILL}"/>`+frame+icon+
    `<text x="${cx}" y="${(cy+h*0.17).toFixed(0)}" font-size="${u*0.03}" fill="${PH_INK}" font-weight="800" text-anchor="middle">${esc(prompt||'Add an image')}</text>`+
    `<text x="${cx}" y="${(cy+h*0.17+u*0.04).toFixed(0)}" font-size="${u*0.02}" fill="${PH_INK}" fill-opacity="0.75" font-weight="700" text-anchor="middle">Click to add, or drag a file in</text>`;
}

function b64urlEncode(obj){ return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDecode(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='='; return JSON.parse(decodeURIComponent(escape(atob(s)))); }

async function encodeShareFragment(obj){
  const json=JSON.stringify(obj);
  if(typeof CompressionStream==='function'){
    try{
      const cs=new CompressionStream('deflate');
      const w=cs.writable.getWriter();
      w.write(new TextEncoder().encode(json)); w.close();
      const buf=await new Response(cs.readable).arrayBuffer();
      return 'z='+bytesToB64url(new Uint8Array(buf));
    }catch(e){}
  }
  return 'd='+b64urlEncode(obj);
}
async function decodeShareFragment(frag){
  if(frag.startsWith('z=')){

    const w=ds.writable.getWriter();
    w.write(b64urlToBytes(frag.slice(2))); w.close();
    const buf=await new Response(ds.readable).arrayBuffer();
    return JSON.parse(new TextDecoder().decode(buf));
  }
  if(frag.startsWith('d=')) return b64urlDecode(frag.slice(2));

}

const EXPORT_SCALE=2;
function svgToPngDataUri(svgString,scale=1){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement('canvas'); cv.width=Math.round(W*scale); cv.height=Math.round(H*scale);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      resolve(cv.toDataURL('image/png'));
    };
    img.onerror=()=>reject(new Error('Slide image export failed'));
    img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svgString)));
  });
}
async function svgToPNG(svgString,filename,cb){
  try{
    const dataUri=await svgToPngDataUri(svgString,EXPORT_SCALE);
    const res=await fetch(dataUri);
    const b=await res.blob();
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=filename; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>{URL.revokeObjectURL(a.href); cb&&cb();},400);
  }catch(e){ alert('Export hit a snag, try again.'); cb&&cb(); }
}
function exportSlidePNG(i){ svgToPNG(buildSVG(deck[i]), `${deckSlug()}-slide-${String(i+1).padStart(2,'0')}.png`); }

async function addPptSlide(slide,sl,i){
  const nativeLayouts=['cover','section','statement','bullets','stat','columns','quote','closing','image','imagetext','screenshot','twoup'];
  if(nativeLayouts.includes(sl.layout)){ addNativeSlide(slide,sl,i); return; }
  const data=await svgToPngDataUri(buildSVG(sl),EXPORT_SCALE);
  slide.addImage({data,x:0,y:0,w:PPT_W,h:PPT_H});
  slide.addNotes('This Deck Studio slide uses an image-based fallback because it contains photo placement or clipping that PowerPoint may not reproduce exactly.');
}
async function exportPPTX(){
  const btn=document.getElementById('btnExport');
  const PptxCtor=window.PptxGenJS || window.pptxgenjs || window.pptxgen;
  if(typeof PptxCtor==='undefined'){
    alert('PowerPoint export needs the PPTX library to load. Check your internet connection and try again.');
    return;
  }
  const old=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML='Building PPTX...';
  try{
    const pptx=new PptxCtor();
    pptx.layout='LAYOUT_WIDE';
    pptx.author='Influential';
    pptx.subject='Deck Studio export';
    pptx.title=deckName.trim()||(deck[0]&&deck[0].title)||'Influential deck';
    pptx.company='Influential';
    for(let i=0;i<deck.length;i++){
      const sl=deck[i];
      const slide=pptx.addSlide();
      slide.background={color:'FFFFFF'};
      await addPptSlide(slide,sl,i);
    }
    await pptx.writeFile({ fileName:`${deckSlug()}.pptx` });
  }catch(e){
    console.error(e);
    alert('PowerPoint export hit a snag. PDF export still works.');
  }finally{
    btn.disabled=false;
    btn.innerHTML=old;
  }
}
function printPDF(){
  const root=document.getElementById('printRoot');
  root.innerHTML=deck.map(sl=>`<div class="pslide">${buildSVG(sl)}</div>`).join('');
  // browsers use document.title as the print-to-PDF default filename
  const prev=document.title; document.title=deckSlug();
  const restore=()=>{ document.title=prev; window.removeEventListener('afterprint',restore); };
  window.addEventListener('afterprint',restore);
  setTimeout(()=>window.print(), 60);
}
function setExportMenu(open){
  document.getElementById('exportWrap').classList.toggle('open', open);
  document.getElementById('btnExport').setAttribute('aria-expanded', open ? 'true' : 'false');
}
async function copyShareLink(){
  const url=location.origin+location.pathname+'?d='+deckSlug()+'#'+await encodeShareFragment(currentPayload());
  try{ await navigator.clipboard.writeText(url); }
  catch(e){ const t=document.createElement('textarea'); t.value=url; document.body.appendChild(t); t.select(); document.execCommand('copy'); t.remove(); }
  const btn=document.getElementById('btnExport'), old=btn.innerHTML;
  btn.innerHTML='Link copied';
  setTimeout(()=>btn.innerHTML=old,1400);
  // embedded images make links long; warn past a practical URL length (export still carries them fine)
  if(url.length>28000) toast('Heavy images make this link very long — share the exported file instead, or use fewer/lighter images.');
}

document.getElementById('menuPDF').onclick=()=>runExport(printPDF);
document.getElementById('menuLink').onclick=()=>runExport(copyShareLink);
document.addEventListener('click',()=>setExportMenu(false));
document.addEventListener('keydown',e=>{ if(e.target.matches('input,textarea'))return;
  if(e.key==='Escape'){ setExportMenu(false); closeLibrary(); }
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){ cur=Math.min(deck.length-1,cur+1); renderAll(); }
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){ cur=Math.max(0,cur-1); renderAll(); } });

/* ===== inline editor overlay ===== */
let hlEl=null, editBox=null, editTextEl=null, editKeyCur=null;
function slideBg(){ const r=document.querySelector('#preview svg rect'); return (r&&r.getAttribute('fill'))||BRAND.navy; }
function bgIsDark(){ try{ return lum(slideBg())<0.42; }catch(e){ return true; } }
function ensureHL(){ if(!hlEl){ hlEl=document.createElement('div'); hlEl.className='editHL'; document.body.appendChild(hlEl);} return hlEl; }
function positionHL(el){ const h=ensureHL(); const b=el.getBoundingClientRect();
  const pad=el.closest('[data-edit-logo]')?9:5;
  const rgb=bgIsDark()?'255,255,255':'32,23,71';
  const logo=!!el.closest('[data-edit-logo]');
  Object.assign(h.style,{left:(b.left-pad)+'px',top:(b.top-pad)+'px',width:(b.width+2*pad)+'px',height:(b.height+2*pad)+'px',
    background:`rgba(${rgb},${logo?0.1:0.08})`, boxShadow:logo?`inset 0 0 0 1.5px rgba(${rgb},.4)`:`inset 0 0 0 1px rgba(${rgb},.22)`});
  h.classList.add('on'); }
function hideHL(){ if(hlEl) hlEl.classList.remove('on'); }
function autoGrow(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight, window.innerHeight*0.5)+'px'; }
function measureTextW(text, weight, fsPx, lsPx){
  const ctx=measureTextW._c||(measureTextW._c=document.createElement('canvas').getContext('2d'));
  ctx.font=`${weight||400} ${fsPx}px 'Effra Trial','Effra',system-ui,'Segoe UI',sans-serif`;
  const line=(text||'').split('\n').sort((a,b)=>b.length-a.length)[0]||'';
  return ctx.measureText(line).width + Math.max(0,line.length-1)*(lsPx||0);
}
function fieldPlaceholder(layout, key){
  const f=((LAYOUT_BY[layout]&&LAYOUT_BY[layout].fields)||[]).find(x=>x[0]===key.split('#')[0]);
  return f ? (f[2]||'') : '';
}
function previewScale(){ const r=document.getElementById('preview').getBoundingClientRect(); return r.width/W; }

// Tab / Shift-Tab: commit and hop to the next/previous editable field on the slide
function moveEdit(dir){
  const key=editKeyCur;
  closeEditor(true);
  const els=[...document.querySelectorAll('#preview [data-edit]')];
  if(!els.length) return;
  let i=els.findIndex(e=>e.getAttribute('data-edit')===key);
  if(i<0) i = dir>0 ? -1 : 0;
  const next=els[(i+dir+els.length)%els.length];
  if(next) openEditor(next);
}
function openEditor(el){
  closeEditor(true);
  hideHL(); hideLogoTip();
  const slide=deck[cur]; const key=el.getAttribute('data-edit');
  // closeEditor() may have re-rendered the preview, detaching el; re-acquire the live node
  el=document.querySelector('#preview [data-edit="'+key+'"]')||el;
  if(!el.isConnected) return;
  editKeyCur=key;
  const {value, multiline}=currentFieldValue(slide, key);
  const b=el.getBoundingClientRect();
  const scale=previewScale();
  const fs=parseFloat(el.getAttribute('font-size')||'16')*scale;
  const fsU=parseFloat(el.getAttribute('font-size')||'16');
  const ls=parseFloat(el.getAttribute('letter-spacing')||'0')*scale;
  const anchor=el.getAttribute('text-anchor')||'start';
  const fill=el.getAttribute('fill')||'#201747';
  // a wrap width means this text wraps to fit the slide (titles): edit it as a
  // wrapping box at the same width so it keeps its line breaks, instead of one long row
  const wrapW=parseFloat(el.getAttribute('data-wrap')||'0')*scale;
  const wrap=wrapW>0;
  const isArea=multiline||wrap;
  const enterCommits=!multiline;            // a wrapped title is logically one line: Enter commits
  const ph=fieldPlaceholder(slide.layout, key);
  const padX=6, padY=3;
  // match the rendered line spacing so wrapped lines sit where they did
  const tspans=el.querySelectorAll('tspan'); let lineH=1.15;
  if(tspans.length>=2 && fsU>0){ lineH=(parseFloat(tspans[1].getAttribute('y'))-parseFloat(tspans[0].getAttribute('y')))/fsU; }
  // hide the real SVG text so it reads as editing the text in place (no doubled glyphs)
  editTextEl=el; el.style.opacity='0';
  editBox=document.createElement(isArea?'textarea':'input');
  editBox.className='editBox'; editBox.value=value; if(ph) editBox.placeholder=ph;
  if(isArea) editBox.rows=Math.max(1, wrap?tspans.length||1:value.split('\n').length);
  Object.assign(editBox.style,{
    fontSize:fs.toFixed(1)+'px',
    fontWeight:el.getAttribute('font-weight')||'600',
    letterSpacing:ls.toFixed(2)+'px',
    lineHeight:isArea?lineH.toFixed(3):'1.15',
    padding:padY+'px '+padX+'px',
    color:fill, caretColor:fill,
    textAlign: anchor==='middle'?'center':anchor==='end'?'right':'left'
  });
  document.body.append(editBox);
  // anchor point that must stay fixed as the text grows (so editing feels in-place)
  const anchorX = anchor==='middle' ? b.left+b.width/2 : anchor==='end' ? b.right : b.left;
  const weight=editBox.style.fontWeight;
  const renderedLines=tspans.length||1;
  const idealW=b.width+3;   // the balanced width the title already renders at (not the full max)
  function layout(){
    let boxW;
    if(wrap){
      // sit at the title's existing balanced width so clicking doesn't widen it;
      // an already-wrapped title keeps that width (new text wraps within it), a one-liner
      // grows with the text up to the slide's max before it wraps
      let contentW = renderedLines>=2 ? idealW : Math.min(wrapW, Math.max(idealW, measureTextW(editBox.value, weight, fs, ls)));
      boxW=Math.min(window.innerWidth*0.96, contentW+2*padX);
    }
    else if(multiline){ boxW=Math.min(window.innerWidth*0.9, Math.max(160, b.width+2*padX+8)); }
    else { boxW=Math.min(window.innerWidth*0.95, measureTextW(editBox.value, weight, fs, ls)+2*padX+3); }
    editBox.style.width=boxW+'px';
    if(isArea) autoGrow(editBox);
    const boxH=editBox.offsetHeight;
    let left = anchor==='middle' ? anchorX-boxW/2 : anchor==='end' ? anchorX+padX-boxW : anchorX-padX;
    let top = isArea ? b.top-padY : b.top+b.height/2-boxH/2;
    left=Math.max(2, Math.min(left, window.innerWidth-boxW-2));
    top=Math.max(2, top);
    Object.assign(editBox.style,{left:left+'px', top:top+'px'});
  }
  layout();
  editBox.focus();
  const end=editBox.value.length; try{ editBox.setSelectionRange(end,end); }catch(e){}
  editBox.addEventListener('input',layout);
  editBox.addEventListener('keydown',ev=>{
    if(ev.key==='Escape'){ ev.preventDefault(); closeEditor(false); }
    else if(ev.key==='Tab'){ ev.preventDefault(); moveEdit(ev.shiftKey?-1:1); }
    else if(ev.key==='Enter' && enterCommits && !ev.shiftKey){ ev.preventDefault(); closeEditor(true); }
  });
  editBox.addEventListener('blur',()=>closeEditor(true));
}
function closeEditor(commit){
  if(!editBox) return;
  const box=editBox, key=editKeyCur, txt=editTextEl; editBox=null; editKeyCur=null; editTextEl=null;
  if(txt) txt.style.opacity='';           // restore the SVG text (a commit re-renders it anyway)
  if(commit){ applyEdit(deck[cur], key, box.value); renderPreview(); renderRailThumb(cur); renderEditor(); }
  box.remove();
}

let logoTipEl=null, logoTipTimer=null, logoTipFor=null;
function ensureLogoTip(){ if(!logoTipEl){ logoTipEl=document.createElement('div'); logoTipEl.className='editTip'; document.body.appendChild(logoTipEl);} return logoTipEl; }
function showLogoTip(lg){ const next=(deck[cur].logo==='ring')?'main logo':'ring mark'; const t=ensureLogoTip(); t.textContent='Click to switch to '+next; t.classList.add('on'); const b=lg.getBoundingClientRect(); const tw=t.offsetWidth; const left=Math.max(8, Math.min(b.left+b.width/2-tw/2, window.innerWidth-tw-8)); Object.assign(t.style,{left:left+'px',top:b.top+'px'}); }
// only surface the tooltip after a short hover, so it isn't twitchy
function queueLogoTip(lg){ if(logoTipFor===lg) return; logoTipFor=lg; clearTimeout(logoTipTimer); if(logoTipEl) logoTipEl.classList.remove('on'); logoTipTimer=setTimeout(()=>{ if(logoTipFor===lg) showLogoTip(lg); }, 480); }
function hideLogoTip(){ logoTipFor=null; clearTimeout(logoTipTimer); if(logoTipEl) logoTipEl.classList.remove('on'); }
let toastTimer=null;
function toast(msg){
  let t=document.querySelector('.editToast');
  if(!t){ t=document.createElement('div'); t.className='editToast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'),1400);
}
function cycleLogo(){
  const sl=deck[cur]; sl.logo=(sl.logo==='ring')?'main':'ring';
  renderPreview(); renderRailThumb(cur); renderEditor();
  toast('Logo: '+(sl.logo==='ring'?'Ring mark':'Main logo'));
}
const previewEl=document.getElementById('preview');
previewEl.addEventListener('click',e=>{
  if(e.target.closest('[data-edit-logo]')){ closeEditor(true); hideHL(); hideLogoTip(); cycleLogo(); return; }
  const t=e.target.closest('[data-edit]');
  if(t){ hideHL(); openEditor(t); return; }
  // click an empty (or filled) image slot to upload/replace
  const slot=e.target.closest('[data-imgslot]');
  if(slot){ hideHL(); closeEditor(true); pickImageFile(slot.dataset.imgslot); }
});
// While an editor is open, clicking another editable target must not let the
// textarea blur first (blur->closeEditor->renderPreview detaches the target
// before the click lands). preventDefault on mousedown keeps focus on the
// current editor, so the click lands live and openEditor/cycleLogo self-commit.
previewEl.addEventListener('mousedown', e=>{
  if(editBox && e.target.closest('[data-edit],[data-edit-logo]')) e.preventDefault();
});
previewEl.addEventListener('mousemove',e=>{
  if(editBox) return;
  const lg=e.target.closest('[data-edit-logo]');
  if(lg){ positionHL(lg); queueLogoTip(lg); return; }
  hideLogoTip();
  const t=e.target.closest('[data-edit]');
  if(t) positionHL(t); else hideHL();
});
previewEl.addEventListener('mouseleave',()=>{ if(!splitDrag){ hideHL(); hideLogoTip(); } });
// drag the Image+text split handle to rebalance image vs text
let splitDrag=false;
previewEl.addEventListener('pointerdown',e=>{
  if(!e.target.closest('[data-split]')) return;
  e.preventDefault(); splitDrag=true; previewEl.classList.add('splitting'); closeEditor(true); hideHL(); hideLogoTip();
  document.body.style.cursor='ew-resize';
});
window.addEventListener('pointermove',e=>{
  if(!splitDrag) return;
  const r=previewEl.getBoundingClientRect();
  const frac=snapSplit((e.clientX-r.left)/r.width);
  if(deck[cur].split!==frac){ deck[cur].split=frac; renderPreview(); }
});
window.addEventListener('pointerup',()=>{ if(splitDrag){ splitDrag=false; previewEl.classList.remove('splitting'); document.body.style.cursor=''; renderRailThumb(cur); } });
// drop an image file straight onto the preview (when the layout has an image slot)
previewEl.addEventListener('dragover',e=>{ if(!dtHasFiles(e)||!currentImageKey()) return; e.preventDefault(); e.dataTransfer.dropEffect='copy'; previewEl.classList.add('drop'); });
previewEl.addEventListener('dragleave',e=>{ if(e.target===previewEl||!previewEl.contains(e.relatedTarget)) previewEl.classList.remove('drop'); });
previewEl.addEventListener('drop',e=>{ if(!dtHasFiles(e)) return; const slot=e.target.closest('[data-imgslot]'); const key=(slot&&slot.dataset.imgslot)||currentImageKey(); if(!key) return; e.preventDefault(); previewEl.classList.remove('drop'); dropImageFile(e,key); });
window.addEventListener('scroll',e=>{ if(e.target===editBox) return; closeEditor(true); },true);
window.addEventListener('resize',()=>closeEditor(true));

const deckNameEl=document.getElementById('deckName');
deckNameEl.addEventListener('input',()=>{ deckName=deckNameEl.value; updateDocTitle(); });

/* ===== images: editor field, upload + downscale ===== */
function imageFieldHTML(key,label,sl){
  const has=!!sl[key];
  const safe=has? sl[key].replace(/"/g,'&quot;') : '';
  return `<div class="field"><label>${esc(label)}</label>
    <div class="imgField" data-imgk="${esc(key)}">
      ${has?`<div class="imgThumb" style="background-image:url(&quot;${safe}&quot;)"></div>`:`<div class="imgEmpty">No image yet</div>`}
      <div class="imgBtns">
        <button class="imgBtn" data-imgact="upload">Upload</button>
        <button class="imgBtn" data-imgact="library">Library</button>
        ${has?`<button class="imgBtn ghost" data-imgact="clear" title="Remove image">✕</button>`:''}
      </div>
    </div></div>`;
}
function pickImageFile(key){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=async()=>{ const f=inp.files&&inp.files[0]; if(!f) return;
    try{ deck[cur][key]=await fileToDataURL(f); renderAll(); }
    catch(e){ console.warn(e); toast('Could not read that image'); } };
  inp.click();
}
// shared file-drop helpers (editor image box + live preview)
function dtHasFiles(ev){ const t=ev.dataTransfer&&ev.dataTransfer.types; return !!t && Array.prototype.indexOf.call(t,'Files')>-1; }
function currentImageKey(){ const f=LAYOUT_BY[deck[cur].layout].fields.find(x=>x[3]==='image'); return f?f[0]:null; }
async function dropImageFile(ev,key){
  const f=ev.dataTransfer.files&&ev.dataTransfer.files[0];
  if(!f){ return; }
  if(!/^image\//.test(f.type)){ toast('Drop an image file (PNG, JPG, SVG…)'); return; }
  try{ deck[cur][key]=await fileToDataURL(f); renderAll(); }
  catch(e){ console.warn(e); toast('Could not read that image'); }
}
const IMG_MAX=1600;   // longest edge after downscale — keeps state + exports + share links sane
function fileToDataURL(file){
  return new Promise((res,rej)=>{
    if(file.type==='image/svg+xml'){ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); return; }
    const r=new FileReader();
    r.onload=()=>{ const img=new Image(); img.onload=()=>res(downscaleToDataURL(img,file.type)); img.onerror=rej; img.src=r.result; };
    r.onerror=rej; r.readAsDataURL(file);
  });
}
function downscaleToDataURL(img,type){
  let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  const scale=Math.min(1, IMG_MAX/Math.max(w,h||1));
  w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  cv.getContext('2d').drawImage(img,0,0,w,h);
  const keepAlpha = type==='image/png' || type==='image/webp';
  try{ return cv.toDataURL(keepAlpha?'image/png':'image/jpeg', keepAlpha?undefined:0.85); }
  catch(e){ return cv.toDataURL('image/png'); }
}

/* ===== the shared Library (data-driven, non-modal side panel) ===== */
let LIB=null, libTargetKey='image', libCat=null, libPanelEl=null;
async function loadLibrary(){
  try{ const r=await fetch('library.json',{cache:'no-cache'}); if(r.ok){ const j=await r.json(); if(j&&Array.isArray(j.assets)) LIB=j; } }
  catch(e){ /* library is optional — Upload still works without it */ }
}
function ensureLibPanel(){ if(libPanelEl) return libPanelEl; const p=document.createElement('aside'); p.className='libPanel'; p.id='libPanel'; document.body.appendChild(p); libPanelEl=p; return p; }
function openLibrary(key){
  libTargetKey=key||'image';
  ensureLibPanel();
  if(LIB&&LIB.categories&&LIB.categories.length){ if(!libCat||!LIB.categories.some(c=>c.id===libCat)) libCat=LIB.categories[0].id; }
  renderLibrary();
  requestAnimationFrame(()=>libPanelEl.classList.add('on'));
}
function closeLibrary(){ if(libPanelEl) libPanelEl.classList.remove('on'); }
function renderLibrary(){
  const p=ensureLibPanel();
  let h=`<div class="libHead"><div><h3>Library</h3><span class="sub">Approved brand assets — click to add</span></div><button class="libX" title="Close">✕</button></div>`;
  if(!LIB||!LIB.assets||!LIB.assets.length){
    h+=`<div class="libGrid"><div class="libEmpty">No library assets loaded yet.<br>Your team adds them in <b>library.json</b>.<br><br>You can still use <b>Upload</b> for your own images.</div></div><div class="libUpload">⬆ Upload your own image instead</div>`;
    p.innerHTML=h; p.querySelector('.libX').onclick=closeLibrary; p.querySelector('.libUpload').onclick=()=>{ closeLibrary(); pickImageFile(libTargetKey); }; return;
  }
  h+=`<div class="libTabs">`;
  (LIB.categories||[]).forEach(c=>{ h+=`<button class="libTab${c.id===libCat?' on':''}" data-cat="${esc(c.id)}">${esc(c.name)}</button>`; });
  h+=`</div><div class="libGrid">`;
  const assets=LIB.assets.filter(a=>a.category===libCat);
  if(!assets.length){ h+=`<div class="libEmpty">Nothing in this category yet.<br>Drop approved assets here in <b>library.json</b>.</div>`; }
  assets.forEach(a=>{ h+=`<div class="libItem" data-asset="${esc(a.id)}"><div class="libThumb"${a.bg?` style="background:${esc(a.bg)}"`:''}><img src="${esc(a.src)}" alt="${esc(a.name)}" loading="lazy"></div><div class="nm">${esc(a.name)}</div></div>`; });
  h+=`</div><div class="libUpload">⬆ Upload your own image instead</div>`;
  p.innerHTML=h;
  p.querySelector('.libX').onclick=closeLibrary;
  p.querySelectorAll('.libTab').forEach(b=>b.onclick=()=>{ libCat=b.dataset.cat; renderLibrary(); });
  p.querySelectorAll('.libItem').forEach(el=>el.onclick=()=>insertLibraryAsset(el.dataset.asset));
  p.querySelector('.libUpload').onclick=()=>{ closeLibrary(); pickImageFile(libTargetKey); };
}
async function insertLibraryAsset(id){
  const a=((LIB&&LIB.assets)||[]).find(x=>x.id===id); if(!a) return;
  try{ deck[cur][libTargetKey]=await assetToDataURL(a.src); renderAll(); renderLibrary(); libPanelEl.classList.add('on'); toast('Added '+a.name); }
  catch(e){ console.warn(e); toast('Could not load that asset'); }
}
async function assetToDataURL(src){
  const r=await fetch(src,{cache:'no-cache'}); if(!r.ok) throw new Error('fetch failed');
  if(/\.svg($|\?)/i.test(src)){ const txt=await r.text(); return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(txt))); }
  const blob=await r.blob();
  return await new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>{ const img=new Image(); img.onload=()=>res(downscaleToDataURL(img,blob.type)); img.onerror=()=>res(fr.result); img.src=fr.result; }; fr.onerror=rej; fr.readAsDataURL(blob); });
}

(async function init(){
  await loadLibrary();
  const hash=location.hash || '';
  if(hash.startsWith('#z=') || hash.startsWith('#d=')){
    try{ loadState(await decodeShareFragment(hash.slice(1))); }
    catch(e){ console.warn('Deck Studio link could not be read:', e.message); }
  }
  syncDeckName();
  renderAll();
})();
</script>
